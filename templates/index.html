<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>

    <!-- Mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-in-out;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 22px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        button {
            padding: 12px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .safe {
            color: green;
        }

        .phishing {
            color: red;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }

        /* 📱 Mobile tweaks */
        @media (max-width: 480px) {
            h1 {
                font-size: 18px;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

    </style>
</head>

<body>

    <div class="card">
        <h1>🔐 Phishing URL Checker</h1>

        <form action="/predict" method="post">
            <div class="input-group">
                <input type="text" name="url" placeholder="Enter URL..." required>
                <button type="submit">Check 🚀</button>
            </div>
        </form>

        {% if result %}
            <div class="result 
                {% if 'Safe' in result %} safe 
                {% elif 'Phishing' in result %} phishing 
                {% endif %}">
                {{ result }}
            </div>
        {% endif %}
    </div>

</body>
</html>
